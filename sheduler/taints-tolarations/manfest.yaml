apiVersion: v1
kind: apps/v1
metadata:
  name: nginx-deployment
  namespace: prasad
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
      tolerations:
      - key: "node"
        operator: "Equal"
        value: "n1"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: "node"
                operator: "Equal"
                values:
                - "n1"
