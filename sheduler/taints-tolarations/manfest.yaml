apiVersion: v1
kind: Namespace
metadata:
  name: prasad
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: prasad
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 8080 # ✅ nginx listens on 80
      tolerations:
        - key: "node"
          operator: "Equal"
          value: "n1"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "node"
                    operator: "In"
                    values:
                      - "n1"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: prasad # ✅ same namespace
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80 # Service port
      targetPort: 8080 # ✅ Send to container port 80
      protocol: TCP
